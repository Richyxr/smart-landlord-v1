runConfig:
  minInstances: 0

env:
  - variable: FIREBASE_PROJECT_ID
    value: "smart-landlord-1e526"
    availability:
      - RUNTIME
  - variable: NODE_ENV
    value: "production"
    availability:
      - RUNTIME
  - variable: APP_ENV
    value: "production"
    availability:
      - RUNTIME
  - variable: DATA_BACKEND
    value: "postgres"
    availability:
      - RUNTIME
  - variable: DATABASE_SSL
    value: "true"
    availability:
      - RUNTIME
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - RUNTIME
  - variable: SESSION_SECRET
    secret: SESSION_SECRET
    availability:
      - RUNTIME
  - variable: ENCRYPTION_KEY
    secret: ENCRYPTION_KEY
    availability:
      - RUNTIME
  - variable: APP_PUBLIC_URL
    value: "https://smart-landlord-1e526.web.app"
    availability:
      - RUNTIME
  # -------------------------------------------------------------------------
  # SMTP (platform-level fallback — Truehost mailbox)
  # Create these secrets before deploying:
  #   firebase apphosting:secrets:set SMTP_HOST
  #   firebase apphosting:secrets:set SMTP_PORT
  #   firebase apphosting:secrets:set SMTP_SECURE
  #   firebase apphosting:secrets:set SMTP_USERNAME
  #   firebase apphosting:secrets:set SMTP_PASSWORD
  #   firebase apphosting:secrets:set EMAIL_FROM
  #   firebase apphosting:secrets:set EMAIL_FROM_NAME
  # -------------------------------------------------------------------------
  - variable: SMTP_HOST
    secret: SMTP_HOST
    availability:
      - RUNTIME
  - variable: SMTP_PORT
    secret: SMTP_PORT
    availability:
      - RUNTIME
  - variable: SMTP_SECURE
    secret: SMTP_SECURE
    availability:
      - RUNTIME
  - variable: SMTP_USERNAME
    secret: SMTP_USERNAME
    availability:
      - RUNTIME
  - variable: SMTP_PASSWORD
    secret: SMTP_PASSWORD
    availability:
      - RUNTIME
  - variable: EMAIL_FROM
    secret: EMAIL_FROM
    availability:
      - RUNTIME
  - variable: EMAIL_FROM_NAME
    secret: EMAIL_FROM_NAME
    availability:
      - RUNTIME
